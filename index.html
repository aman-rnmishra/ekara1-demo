  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <!-- GitHub Pages SPA: restore path after 404 redirect (?/path) -->
  <script>
    (function (location) {
      if (location.hash.startsWith('#/')) {
        history.replaceState(null, '', location.hash.slice(1) + location.search)
      }
      if (location.search[1] === '/') {
        var decoded = location.search.slice(1).split('&').map(function (segment) {
          return segment.replace(/~and~/g, '&')
        }).join('?')
        window.history.replaceState(null, null, location.pathname.slice(0, -1) + decoded + location.hash)
      }
    }(window.location))
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
