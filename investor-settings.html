<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekara — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="investor-common.css" rel="stylesheet">
  <style>
    .form-group select { max-width: 280px; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo"><a href="investor-dashboard.html"><img src="image.png" alt="Ekara" class="logo-img"></a></div>
      <nav class="nav">
        <a href="investor-dashboard.html">Portfolio</a>
        <a href="investor-reports.html">Reports</a>
        <a href="investor-benchmarks.html">Benchmarks</a>
        <a href="investor-recommendations.html">Recommendations</a>
        <a href="investor-settings.html" class="active">Settings</a>
      </nav>
    </aside>
    <main class="main">
      <header class="header">
        <h1>Settings</h1>
        <div class="header-right">
          <div class="notification-dropdown">
            <button type="button" class="notification-bell" title="Notifications" aria-expanded="false" aria-haspopup="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="notification-badge">1</span>
            </button>
            <div class="notification-popover">
              <div class="notification-popover-header">Notifications</div>
              <div class="notification-popover-body">
                <a href="investor-recommendations.html" class="notification-item">
                  <span class="notification-item-title">New portfolio recommendations</span>
                  <span class="notification-item-time">2 days ago</span>
                </a>
              </div>
              <a href="investor-recommendations.html" class="notification-popover-footer">See all recommendations</a>
            </div>
          </div>
          <a href="investor-settings.html" class="avatar">I</a>
        </div>
      </header>
      <div class="content">
        <section class="card">
          <div class="card-title">Profile</div>
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="profileName" value="Investor User">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="profileEmail" value="investor@fund.vc">
          </div>
          <button type="button" class="btn btn-primary" onclick="saveProfile()">Save profile</button>
        </section>
        <section class="card">
          <div class="card-title">Notifications</div>
          <div class="form-group">
            <label>Report digest</label>
            <select id="digest">
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="off">Off</option>
            </select>
          </div>
          <div class="form-group">
            <label><input type="checkbox" id="alerts" checked> Alert when runway &lt; 6 months</label>
          </div>
          <button type="button" class="btn btn-primary" onclick="saveNotifications()">Save preferences</button>
        </section>
      </div>
    </main>
  </div>
  <div id="toast" class="toast" style="display: none;"></div>
  <script>
    function showToast(msg) { var el = document.getElementById('toast'); el.textContent = msg; el.style.display = 'block'; setTimeout(function() { el.style.display = 'none'; }, 3000); }
    function saveProfile() { showToast('Profile saved'); }
    function saveNotifications() { showToast('Notification preferences saved'); }
  </script>
  <script src="notification-dropdown.js"></script>
</body>
</html>
